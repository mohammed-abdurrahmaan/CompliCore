services:
  - type: web
    name: complicore-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_NAME
        value: complicore
      - key: CORS_ORIGINS
        value: "*"
      # MONGO_URL and JWT_SECRET are set in the Render dashboard as secrets, not here.
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
